<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhostContext</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>👻 GhostContext</h1>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked />
        <span class="slider"></span>
      </label>
    </header>

    <section class="form">
      <label for="bio">个人简介</label>
      <textarea id="bio" rows="3" placeholder="你是谁、做什么、技术栈、当前项目…"></textarea>

      <label for="persona">AI 人设</label>
      <textarea id="persona" rows="3" placeholder="希望 AI 扮演什么角色，如：资深后端工程师…"></textarea>

      <label for="style">风格要求</label>
      <textarea id="style" rows="2" placeholder="语气、格式、长度偏好，如：简洁专业、代码优先…"></textarea>

      <label for="reinjectInterval">重新注入间隔 <small>(轮数，0=仅新会话)</small></label>
      <input type="number" id="reinjectInterval" min="0" max="100" value="10" />
    </section>

    <footer>
      <button id="save">保存</button>
      <div class="debug-area">
        <label class="debug-toggle">
          <input type="checkbox" id="debug" />
          <span>调试</span>
        </label>
        <label class="debug-toggle" id="show-injection-label" style="display:none">
          <input type="checkbox" id="showInjection" />
          <span>显示注入</span>
        </label>
      </div>
    </footer>

    <div id="status" class="status"></div>
  </div>

  <script src="./main.ts" type="module"></script>
</body>
</html>
