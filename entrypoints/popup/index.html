<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>潜忆</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Unsupported site overlay -->
  <div id="unsupported" class="unsupported" hidden>
    <p class="unsupported-icon">🚫</p>
    <p class="unsupported-text">当前网站不支持</p>
    <p class="unsupported-hint">请在 chat.deepseek.com 上使用</p>
  </div>

  <div class="container" id="main" hidden>
    <!-- Header -->
    <header>
      <h1>潜忆</h1>
      <div class="header-actions">
        <button id="checkUpdate" class="icon-btn" title="检查更新">🆕</button>
        <button id="settings" class="icon-btn" title="设置">⚙️</button>
      </div>
    </header>

    <!-- Update notice -->
    <section class="update-bar" id="updateBar" hidden>
      <span id="updateText">发现新版本</span>
      <button id="downloadUpdate" class="update-link">下载</button>
    </section>

    <!-- Injection Mode -->
    <section class="section">
      <label class="section-label">传递深度</label>
      <div class="mode-bar" id="modeBar"></div>
      <p class="mode-desc" id="modeDesc"></p>
    </section>

    <!-- Identity selector -->
    <section class="section">
      <div class="section-header">
        <label class="section-label">👤 用户画像</label>
        <button id="editIdentity" class="edit-link">编辑 ↗</button>
      </div>
      <div class="slot-bar" id="identityBar"></div>
    </section>

    <!-- Persona selector -->
    <section class="section">
      <div class="section-header">
        <label class="section-label">🤖 AI 人设</label>
        <div class="section-actions">
          <button id="importPersona" class="edit-link" title="导入潜忆匙">🔑 导入</button>
          <button id="editPersona" class="edit-link">编辑 ↗</button>
        </div>
      </div>
      <div class="slot-bar" id="personaBar"></div>
    </section>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden>
    <span id="toastText"></span>
  </div>

  <script src="./main.ts" type="module"></script>
</body>
</html>
